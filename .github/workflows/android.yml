name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_unit_test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./stardroid-v1

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4
        continue-on-error: true
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build and test
        run: ./gradlew assembleGmsDebug testGmsDebugUnitTest --no-daemon
        env:
          ORG_GRADLE_PROJECT_org_gradle_java_home: ${{ env.JAVA_HOME }}
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: 'stardroid-v1/**/build/reports/tests/'
      - name: Android Test Report
        uses: asadmansr/android-test-report-action@v1.2.0
        if: always()

  connected_test:
    needs: build_and_unit_test
    runs-on: ubuntu-latest
    timeout-minutes: 50
    defaults:
      run:
        working-directory: ./stardroid-v1
    strategy:
      matrix:
        api-level: [ 34, 36 ] # Keep 34 as it pre-dates edge to edge.
        target: [ default ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        working-directory: ./ # Keep KVM at root
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4
        continue-on-error: true

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.target }}-x86_64

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-boot-timeout: 1200
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -memory 2048 -partition-size 512
          disable-animations: false
          profile: Nexus 6
          working-directory: ./stardroid-v1
          script: echo "Generated AVD snapshot for caching."

      - name: Run connected tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          force-avd-creation: false
          emulator-boot-timeout: 1200
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -memory 2048 -partition-size 512
          disable-animations: true
          profile: Nexus 6
          working-directory: ./stardroid-v1
          script: |
            adb wait-for-device
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb logcat -c
            adb logcat -G 16M
            adb logcat > logcat.log 2>&1 &
            LOGCAT_PID=$!
            timeout 1200 ./gradlew connectedGmsDebugAndroidTest -x lint --stacktrace -Pandroid.testInstrumentationRunnerArguments.notAnnotation=com.google.android.stardroid.test.ScreengrabTest
            kill $LOGCAT_PID 2>/dev/null || true
            wait $LOGCAT_PID 2>/dev/null || true
      - name: Upload connected test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: connected-test-results-${{ matrix.api-level }}
          path: |
            stardroid-v1/**/build/reports/androidTests/
            stardroid-v1/logcat.log
